providers:
  ollama:
    name: "Ollama Local"
    api_type: "openai"
    base_url: "http://localhost:11434/v1"
    env_var: null

    models:
      qwen3.5-9b:
        model_id: "qwen3.5:9b-q4_K_M"
        description: "Primary inference model for all extraction and reasoning"
        context_window: 32768
        max_output_tokens: 8192
        input_cost_per_1m: 0.0
        output_cost_per_1m: 0.0
        capabilities:
          - text_generation
          - structured_extraction
          - reasoning
          - entity_extraction
          - confidence_scoring
        role: primary
        priority: 1

routing:
  default:
    model: "ollama/qwen3.5-9b"
    fallback: null

  by_task_type:
    extraction:
      model: "ollama/qwen3.5-9b"
      max_tokens: 4096
      temperature: 0.2
    judging:
      model: "ollama/qwen3.5-9b"
      max_tokens: 2048
      temperature: 0.1
    hypothesis:
      model: "ollama/qwen3.5-9b"
      max_tokens: 4096
      temperature: 0.7
    alignment:
      model: "ollama/qwen3.5-9b"
      max_tokens: 2048
      temperature: 0.1
    digest:
      model: "ollama/qwen3.5-9b"
      max_tokens: 4096
      temperature: 0.3

rate_limits:
  ollama/qwen3.5-9b:
    requests_per_minute: 10
    concurrent_requests: 1

budgets:
  daily_limit_papers: 50
  daily_limit_tokens: 5000000
  per_paper_token_cap: 100000
  alert_threshold: 0.9
