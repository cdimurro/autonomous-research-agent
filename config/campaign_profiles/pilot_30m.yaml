profile_name: pilot_30m
description: "30-minute bounded pilot campaign for pipeline validation"
profile_type: pilot

# Domain and program
domain: clean-energy
program_name: clean_energy
mode: production

# Budget constraints
wall_clock_budget_minutes: 30
candidate_trial_budget: 5
policy_trial_budget: 3

# Stage overrides (conservative for pilot)
stage1:
  max_trials: 3
  min_score_to_advance: 0.40
  max_wall_clock_seconds: 600
  abandon_floor: 0.30
  early_stop_margin: 0.15

stage2_shortlist_size: 3

stage3:
  max_trials: 3
  min_score_to_advance: 0.50
  max_wall_clock_seconds: 180
  abandon_floor: 0.40

stage4_review_prep: true

# Falsification settings
falsification:
  enabled: true
  strict_mode: false

# Review and export
review_packet_generation: true
export_artifacts: true
export_format: ["json", "markdown"]

# Health thresholds
health:
  min_candidates_generated: 3
  min_stages_completed: 3
  max_stage_failure_rate: 0.5
  max_retry_count: 3

# Retry policy
retry:
  max_retries_per_stage: 2
  retry_delay_seconds: 5
  retryable_errors:
    - "ollama_timeout"
    - "db_lock"
    - "file_write"

# Diagnostic mode
diagnostic_rich: true
verbose_logging: true
