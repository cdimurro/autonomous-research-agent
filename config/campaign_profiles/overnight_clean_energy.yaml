profile_name: overnight_clean_energy
description: "Overnight unattended clean-energy discovery campaign"
profile_type: overnight

# Domain and program
domain: clean-energy
program_name: daily_quality
mode: production

# Budget constraints
wall_clock_budget_minutes: 480
candidate_trial_budget: 50
policy_trial_budget: 15

# Stage overrides (quality-first, more exploratory)
stage1:
  max_trials: 10
  min_score_to_advance: 0.45
  max_wall_clock_seconds: 3600
  abandon_floor: 0.35
  early_stop_margin: 0.12

stage2_shortlist_size: 5

stage3:
  max_trials: 5
  min_score_to_advance: 0.55
  max_wall_clock_seconds: 600
  abandon_floor: 0.45

stage4_review_prep: true

# Falsification settings
falsification:
  enabled: true
  strict_mode: true

# Review and export
review_packet_generation: true
export_artifacts: true
export_format: ["json", "markdown"]

# Health thresholds
health:
  min_candidates_generated: 10
  min_stages_completed: 4
  max_stage_failure_rate: 0.3
  max_retry_count: 10

# Retry policy
retry:
  max_retries_per_stage: 3
  retry_delay_seconds: 10
  retryable_errors:
    - "ollama_timeout"
    - "db_lock"
    - "file_write"

# Overnight-specific
diagnostic_rich: false
verbose_logging: false
quality_first: true
sub_domain_rotation: true
