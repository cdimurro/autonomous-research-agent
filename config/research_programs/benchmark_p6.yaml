name: benchmark_p6
domain: clean-energy
goal: "Fixed-seed deterministic benchmark for Phase 6 regression testing against Phase 5 validated baseline."
candidate_budget: 5
simulation_budget: 3
scoring_weights:
  novelty: 0.20
  plausibility: 0.25
  impact: 0.25
  evidence_strength: 0.15
  simulation_readiness: 0.10
  inverse_validation_cost: 0.05
novelty_threshold: 0.35
evidence_minimum: 2
allowed_simulators:
  - mock
publication_threshold: 0.60
banned_claims:
  - "perpetual motion"
  - "over-unity device"
  - "cold fusion at room temperature without nuclear signatures"
  - "free energy"
safety_constraints:
  - "Must not violate thermodynamic limits"
  - "Must not claim efficiencies above Shockley-Queisser limit without multi-junction justification"
  - "Energy balance must be positive"
runtime_budget_minutes: 5
mode: deterministic_test
# Fixed seed for reproducibility — do not change
seed: 42
# This config is frozen for Phase 6 baseline comparison. Do not modify.
